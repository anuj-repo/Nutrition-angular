<div class="notifications-container">
  <div class="page-header">
    <h2>🔔 Notifications <span class="badge" *ngIf="unreadCount > 0">{{ unreadCount }}</span></h2>
    <div class="actions">
      <button mat-button [class.active]="filter==='all'" (click)="filter='all'">All</button>
      <button mat-button [class.active]="filter==='unread'" (click)="filter='unread'">Unread</button>
      <button mat-stroked-button color="primary" (click)="markAllRead()" *ngIf="unreadCount > 0">Mark all read</button>
      <button mat-icon-button routerLink="/notification-preferences" matTooltip="Preferences">
        <mat-icon>settings</mat-icon>
      </button>
    </div>
  </div>

  <div class="notif-list" *ngIf="filtered.length > 0">
    <mat-card *ngFor="let n of filtered" class="notif-card" [class.unread]="!n.isRead" (click)="markRead(n)">
      <mat-card-content>
        <div class="notif-row">
          <div class="notif-icon">{{ iconFor(n.notificationType) }}</div>
          <div class="notif-body">
            <div class="notif-title">{{ n.title }}</div>
            <div class="notif-msg">{{ n.message }}</div>
            <div class="notif-meta">{{ n.createdAt | date:'medium' }}</div>
          </div>
          <span class="dot" *ngIf="!n.isRead"></span>
        </div>
      </mat-card-content>
    </mat-card>
  </div>

  <p *ngIf="filtered.length === 0" class="empty">No notifications.</p>
</div>
