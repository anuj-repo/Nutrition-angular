<div class="user-welcome-container">
  <div class="welcome-card">
    <div class="welcome-icon">👋</div>
    <h1 class="welcome-title">Welcome, <span class="user-name-highlight">{{name}}</span></h1>
    <p class="welcome-subtitle">You're all set. Use the navigation above to explore your dashboard, manage your team, and track your earnings.</p>
    <div class="quick-links">
      <a mat-raised-button color="primary" routerLink="/dashboard">
        <mat-icon>dashboard</mat-icon> Go to Dashboard
      </a>
      <a mat-stroked-button routerLink="/add-member">
        <mat-icon>person_add</mat-icon> Add Member
      </a>
    </div>
  </div>
</div>
