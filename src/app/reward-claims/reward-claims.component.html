<div class="claims-container">
  <div class="page-header"><h2>🎁 My Reward Claims</h2></div>

  <table mat-table [dataSource]="claims" class="full-width" *ngIf="claims.length">
    <ng-container matColumnDef="reward"><th mat-header-cell *matHeaderCellDef>Reward</th>
      <td mat-cell *matCellDef="let c">{{ c.rewardTier?.rewardName }}</td></ng-container>
    <ng-container matColumnDef="achieved"><th mat-header-cell *matHeaderCellDef>Achieved</th>
      <td mat-cell *matCellDef="let c">{{ c.achievedDate | date:'mediumDate' }}</td></ng-container>
    <ng-container matColumnDef="claimed"><th mat-header-cell *matHeaderCellDef>Claimed</th>
      <td mat-cell *matCellDef="let c">{{ c.claimedDate | date:'mediumDate' }}</td></ng-container>
    <ng-container matColumnDef="status"><th mat-header-cell *matHeaderCellDef>Delivered</th>
      <td mat-cell *matCellDef="let c">
        <span class="badge" [class.delivered]="c.isClaimed" [class.pending]="!c.isClaimed">
          {{ c.isClaimed ? '✓ Delivered' : 'Pending Delivery' }}
        </span>
      </td></ng-container>
    <ng-container matColumnDef="notes"><th mat-header-cell *matHeaderCellDef>Notes</th>
      <td mat-cell *matCellDef="let c">{{ c.notes || '-' }}</td></ng-container>
    <tr mat-header-row *matHeaderRowDef="['reward','achieved','claimed','status','notes']"></tr>
    <tr mat-row *matRowDef="let row; columns: ['reward','achieved','claimed','status','notes']"></tr>
  </table>

  <p *ngIf="!claims.length && !loading" class="empty">No claims yet. <a routerLink="/rewards">View Rewards →</a></p>
</div>
