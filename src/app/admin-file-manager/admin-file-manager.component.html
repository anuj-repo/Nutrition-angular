<div class="fm-container">
  <div class="page-header"><h2>📁 File Manager</h2></div>

  <div class="alert success" *ngIf="successMessage">{{ successMessage }}</div>
  <div class="alert error" *ngIf="errorMessage">{{ errorMessage }}</div>

  <mat-card class="upload-card">
    <mat-card-content>
      <h3>Upload File</h3>
      <div class="upload-row">
        <mat-form-field appearance="outline">
          <mat-label>Category</mat-label>
          <mat-select [(ngModel)]="category">
            <mat-option *ngFor="let c of categories" [value]="c">{{ c }}</mat-option>
          </mat-select>
        </mat-form-field>
        <label class="upload-btn">
          <mat-icon>cloud_upload</mat-icon> {{ uploading ? 'Uploading...' : 'Choose File' }}
          <input type="file" (change)="onFile($event)" hidden>
        </label>
      </div>
    </mat-card-content>
  </mat-card>

  <mat-card class="files-card">
    <mat-card-content>
      <h3>Uploaded Files ({{ uploadedFiles.length }})</h3>
      <p class="muted" *ngIf="!uploadedFiles.length">No recent uploads. (List shows last 50 from this browser.)</p>
      <table mat-table [dataSource]="uploadedFiles" class="full-width" *ngIf="uploadedFiles.length">
        <ng-container matColumnDef="cat"><th mat-header-cell *matHeaderCellDef>Category</th>
          <td mat-cell *matCellDef="let f">{{ f.category }}</td></ng-container>
        <ng-container matColumnDef="name"><th mat-header-cell *matHeaderCellDef>Name</th>
          <td mat-cell *matCellDef="let f">{{ f.name }}</td></ng-container>
        <ng-container matColumnDef="actions"><th mat-header-cell *matHeaderCellDef>Actions</th>
          <td mat-cell *matCellDef="let f; let i = index">
            <button mat-button color="primary" (click)="preview(f)"><mat-icon>visibility</mat-icon> View</button>
            <button mat-button color="warn" (click)="delete(f, i)"><mat-icon>delete</mat-icon> Delete</button>
          </td></ng-container>
        <tr mat-header-row *matHeaderRowDef="['cat','name','actions']"></tr>
        <tr mat-row *matRowDef="let row; columns: ['cat','name','actions']"></tr>
      </table>
    </mat-card-content>
  </mat-card>
</div>
