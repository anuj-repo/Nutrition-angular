<div class="ph-container">
  <div class="page-header">
    <h2>💳 Payment History</h2>
    <p class="muted">Total spent: <strong>₹{{ total() | number }}</strong></p>
  </div>

  <table mat-table [dataSource]="payments" class="full-width" *ngIf="payments.length">
    <ng-container matColumnDef="date"><th mat-header-cell *matHeaderCellDef>Date</th>
      <td mat-cell *matCellDef="let p">{{ p.paymentDate | date:'medium' }}</td></ng-container>
    <ng-container matColumnDef="orderId"><th mat-header-cell *matHeaderCellDef>Order #</th>
      <td mat-cell *matCellDef="let p">{{ p.orderId }}</td></ng-container>
    <ng-container matColumnDef="mode"><th mat-header-cell *matHeaderCellDef>Mode</th>
      <td mat-cell *matCellDef="let p">{{ p.paymentMode }}</td></ng-container>
    <ng-container matColumnDef="amount"><th mat-header-cell *matHeaderCellDef>Amount</th>
      <td mat-cell *matCellDef="let p">₹{{ p.amount | number }}</td></ng-container>
    <ng-container matColumnDef="status"><th mat-header-cell *matHeaderCellDef>Status</th>
      <td mat-cell *matCellDef="let p"><span class="badge" [ngClass]="p.status?.toLowerCase()">{{ p.status }}</span></td></ng-container>
    <ng-container matColumnDef="ref"><th mat-header-cell *matHeaderCellDef>Reference</th>
      <td mat-cell *matCellDef="let p">{{ p.transactionId }}</td></ng-container>
    <tr mat-header-row *matHeaderRowDef="['date','orderId','mode','amount','status','ref']"></tr>
    <tr mat-row *matRowDef="let row; columns: ['date','orderId','mode','amount','status','ref']"></tr>
  </table>

  <p *ngIf="!payments.length && !loading" class="empty">No payments yet.</p>
</div>
